<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POS payments — decks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #000b19; --text: #e8ecf0; --muted: #9ca3af; --accent: #3d7fe0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { max-width: 36rem; text-align: center; }
    h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 0.5rem; }
    p { color: var(--muted); margin: 0 0 1.5rem; line-height: 1.5; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.75rem; }
    a {
      display: block;
      padding: 0.85rem 1.25rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      background: rgba(255,255,255,0.04);
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover { border-color: var(--accent); background: rgba(0, 89, 213, 0.15); }
    a span { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-top: 0.35rem; }
  </style>
</head>
<body>
  <main>
    <h1>POS payments</h1>
    <p>Static HTML decks for GitHub Pages. Choose a presentation:</p>
    <ul>
      <li><a href="gtm-sales-deck/">GTM investment deck <span>Template — market, economics, ramp</span></a></li>
      <li><a href="pricing-deck/">Pricing &amp; economics <span>BC table, competitor stats, scenarios</span></a></li>
      <li><a href="pos-pricing-model/PRICING-PRINCIPLES-AND-SCENARIOS.html">Pricing principles &amp; scenarios <span>Executive memo — context, principles, two charts</span></a></li>
    </ul>
  </main>
</body>
</html>
